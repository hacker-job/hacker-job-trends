name: Refresh GitHub data

# Sponsors (Hackers page) and @timqian's profile/README change rarely — refresh
# weekly and commit. Triggers a redeploy via the push to main.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

concurrency:
  group: refresh-github-data
  cancel-in-progress: false
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch sponsors + founder
        env:
          # PAT belonging to the sponsored account (sponsor lists are only visible
          # to the sponsorable). Founder fetch also uses it to avoid rate limits.
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          npm run hackers || echo "hackers fetch skipped/failed (is GH_PAT set?)"
          npm run founder

      - name: Commit refreshed data
        run: |
          if [ -z "$(git status --porcelain data/hackers.json)" ]; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hackers.json
          git commit -m "data: refresh sponsors + founder ($(date -u +%Y-%m-%d))"
          git push
