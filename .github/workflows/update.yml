name: Daily job update

# People keep posting to the current "Who is hiring?" thread all month, so we
# pull + parse new posts daily and commit the refreshed data back to the repo.
on:
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC daily
  workflow_dispatch: {} # allow manual runs

# Avoid overlapping runs and let the job push commits.
concurrency:
  group: daily-update
  cancel-in-progress: false
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch + parse new posts
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: npm run update

      - name: Commit refreshed data
        run: |
          if [ -z "$(git status --porcelain site/data)" ]; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data
          git commit -m "data: daily update ($(date -u +%Y-%m-%d))"
          git push
