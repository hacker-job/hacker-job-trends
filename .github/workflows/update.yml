name: Daily job update

# People keep posting to the current "Who is hiring?" thread all month, so we
# pull + parse new posts daily and commit the refreshed data back to the repo.
on:
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC daily
  workflow_dispatch: {} # allow manual runs

# Avoid overlapping runs and let the job push commits.
concurrency:
  group: daily-update
  cancel-in-progress: false
permissions:
  contents: write
  actions: write # to trigger the deploy workflow after a data change

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch new posts (queue them)
        run: npm run jobs:fetch

      - name: Analyze queued posts (AI)
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: npm run jobs:analyze

      - name: Commit refreshed data
        id: commit
        run: |
          if [ -z "$(git status --porcelain data)" ]; then
            echo "No data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "data: daily update ($(date -u +%Y-%m-%d))"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # A push made with GITHUB_TOKEN does NOT trigger other workflows (GitHub's
      # anti-recursion rule), so deploy.yml's `push` trigger never fires for the
      # data commit. Dispatch it explicitly when the data actually changed.
      # Pass the exact commit SHA: `main` may not have propagated yet, so
      # dispatching by ref alone can build the pre-push commit (stale data).
      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main -f sha="$(git rev-parse HEAD)"
