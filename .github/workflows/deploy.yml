name: Deploy to Pages

# Builds the Vite app and bundles the dataset, then publishes to GitHub Pages.
# Runs on app changes (push) and after the data workflows finish — those commit
# with GITHUB_TOKEN, whose pushes can't trigger another workflow's `push` event,
# so we hook their completion via `workflow_run` to keep the live site fresh.
on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Daily job update", "Refresh GitHub data"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Decide whether to deploy. A data workflow that committed nothing leaves main's
  # HEAD unchanged from the run's head_sha — in that case there's nothing to ship.
  changed:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "workflow_run" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          latest=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_branch }}" --jq .sha)
          if [ "$latest" = "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "${{ github.event.workflow_run.name }} committed no data — skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: changed
    if: ${{ needs.changed.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        # On workflow_run, github.sha is the pre-commit head_sha; check out the
        # branch tip instead so we ship the data the run just committed.
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build app
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Bundle dataset
        run: |
          mkdir -p frontend/dist/data
          cp -r data/jobs frontend/dist/data/jobs
          cp data/trends.json data/hackers.json frontend/dist/data/
          # SPA fallback so client routes (/trends, /hackers) work on refresh
          cp frontend/dist/index.html frontend/dist/404.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
