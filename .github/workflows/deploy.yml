name: Deploy to Pages

# Builds the Vite app and bundles the dataset, then publishes to GitHub Pages.
# Runs on app changes (push) and after the data workflows finish — those commit
# with GITHUB_TOKEN, whose pushes can't trigger another workflow's `push` event,
# so we hook their completion via `workflow_run` to keep the live site fresh.
on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Daily job update", "Refresh GitHub data"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # On a workflow_run trigger, only deploy if the data workflow succeeded;
    # push / manual dispatch always proceed.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build app
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Bundle dataset
        run: |
          mkdir -p frontend/dist/data
          cp -r data/jobs frontend/dist/data/jobs
          cp data/trends.json data/hackers.json frontend/dist/data/
          # SPA fallback so client routes (/trends, /hackers) work on refresh
          cp frontend/dist/index.html frontend/dist/404.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
