name: Deploy to Pages

# Builds the Vite app and bundles the dataset, then publishes to GitHub Pages.
# Runs on app changes and on the daily data commit (so the live site stays fresh).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build app
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Bundle dataset
        run: |
          mkdir -p frontend/dist/data
          cp -r data/jobs frontend/dist/data/jobs
          cp data/trends.json data/hackers.json frontend/dist/data/
          # SPA fallback so client routes (/trends, /hackers) work on refresh
          cp frontend/dist/index.html frontend/dist/404.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
